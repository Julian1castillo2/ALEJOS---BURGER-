        let cart = {};

        // Formateador de moneda colombiana
        function formatMoney(value) {
            return new Intl.NumberFormat('es-CO', { maximumFractionDigits: 0 }).format(value);
        }

        // Renderizar menú
        function renderMenu(categoryFilter = 'all') {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            const filtered = categoryFilter === 'all' ? products : products.filter(p => p.cat === categoryFilter);

            filtered.forEach(p => {
                const quantity = cart[p.id] || 0;
                const card = document.createElement('div');
                card.className = "card-dark p-5 rounded-2xl flex flex-col justify-between transition transform hover:-translate-y-1 shadow-lg";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start gap-2">
                            <h3 class="font-bold text-lg text-white">${p.name}</h3>
                            <span class="gold-text font-bold text-lg whitespace-nowrap">$${formatMoney(p.price)}</span>
                        </div>
                        <p class="text-xs text-gray-400 mt-2 leading-relaxed">${p.desc}</p>
                    </div>
                    <div class="mt-4 flex items-center justify-between">
                        <span class="text-xs text-zinc-500 uppercase font-semibold tracking-wider">${p.cat}</span>
                        <div class="flex items-center space-x-2">
                            ${quantity > 0 ? `
                                <button onclick="updateCart(${p.id}, -1)" class="bg-zinc-800 text-white w-8 h-8 rounded-lg font-bold hover:bg-zinc-700">-</button>
                                <span class="font-bold text-white px-2">${quantity}</span>
                            ` : ''}
                            <button onclick="updateCart(${p.id}, 1)" class="gold-bg text-black font-bold px-3 py-1 rounded-lg hover:bg-yellow-500 text-sm">
                                ${quantity > 0 ? '+' : 'Agregar'}
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Actualizar Carrito Dinámico
        function updateCart(id, change) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += change;
            if (cart[id] <= 0) delete cart[id];
            
            renderMenu(document.querySelector('.cat-btn.active').getAttribute('onclick').match(/'([^']+)'/)[1]);
            updateCartBar();
        }

        function updateCartBar() {
            const bar = document.getElementById('cart-bar');
            const countEl = document.getElementById('cart-count');
            const totalEl = document.getElementById('cart-total');
            
            let totalItems = 0;
            let totalPrice = 0;

            for (const id in cart) {
                const p = products.find(prod => prod.id == id);
                totalItems += cart[id];
                totalPrice += p.price * cart[id];
            }

            countEl.innerText = totalItems;
            totalEl.innerText = formatMoney(totalPrice);

            if (totalItems > 0) {
                bar.classList.remove('translate-y-full');
            } else {
                bar.classList.add('translate-y-full');
            }
        }

        // Filtrar categorías cambiando estilos de botones
        function filterCategory(cat) {
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-yellow-500', 'text-black', 'active');
                btn.classList.add('bg-zinc-800', 'text-gray-300');
            });

            const activeBtn = Array.from(buttons).find(btn => btn.getAttribute('onclick').includes(`'${cat}'`));
            if (activeBtn) {
                activeBtn.classList.remove('bg-zinc-800', 'text-gray-300');
                activeBtn.classList.add('bg-yellow-500', 'text-black', 'active');
            }

            renderMenu(cat);
        }

        // Enviar pedido estructurado por WhatsApp
        function sendOrder() {
            let message = "🍔 *Nuevo Pedido - Alejos Burger* 🍔\n\n";
            let total = 0;

            for (const id in cart) {
                const p = products.find(prod => prod.id == id);
                const subtotal = p.price * cart[id];
                message += `• *${cart[id]}x* ${p.name} (_$${formatMoney(p.price)} c/u_)\n`;
                total += subtotal;
            }

            message += `\n💰 *Total Pedido: $${formatMoney(total)}*`;
            message += `\n\n📍 _Por favor envíame tu dirección y confirma el método de pago._`;

            const encoded = encodeURIComponent(message);
            // Redirige al primer número por defecto
            window.open(`https://wa.me/573226259314?text=${encoded}`, '_blank');
        }

        // Inicializar
        renderMenu('all');
    </script>
